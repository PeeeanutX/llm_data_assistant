# Development stack: a Postgres container plus the Streamlit app.
#
#   docker compose up --build
#
# Required: an OPENAI_API_KEY in your environment or a sibling .env file.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in your environment or .env}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/data_assistant
      INTERACTIONS_TABLE: interactions_experiment
    ports:
      - "8501:8501"
    volumes:
      # Mount the source workbook read-only so the SQLite warehouse can be built.
      - ./streamlit_agent:/app/streamlit_agent:ro

volumes:
  pgdata:
